<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport"
    content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
    name="theme-color" content="#000000" />
  <title>SurveyPass</title>
</head>

<style>
  .mobile-body {
    overflow: hidden;
    height: 100vh;
  }

  .mobile-wrap {
    position: absolute;
    left: 0;
    top: 0;
    right: 0;
    bottom: 0;
    overflow-x: hidden;
    overflow-y: auto;
    overscroll-behavior: none;
  }

  .mobile-content {
    height: calc(100% + 1px);
  }

  .root {
    width: 100%;
    height: 100%;
  }
</style>

<script>
  function loadEnvConfigFallback() {
    const script = document.createElement('script');
    script.src = './env-config.js';
    script.onerror = function () {
      console.warn('[init] env-config.js failed to load, using build-time env only');
    };
    document.head.appendChild(script);
  }
</script>

<body>
  <noscript>You need to enable JavaScript to run this app.</noscript>
  <div id="wrap">
    <div id="content">
      <div id="root"></div>
      <script src="/env-config.js" onerror="loadEnvConfigFallback()"></script>
      <script src="/src/index.tsx" type="module"></script>
    </div>
  </div>
</body>

<script>
  (function () {
    document.body.classList.add('mobile-body');
    document.getElementById('wrap').classList.add('mobile-wrap');
    document.getElementById('content').classList.add('mobile-content');
    document.getElementById('root').classList.add('root');
  })();
</script>

</html>
